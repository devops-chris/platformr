project_name: platformr

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/devops-chris/platformr/cmd.Version={{.Version}}
      - -X github.com/devops-chris/platformr/cmd.Commit={{.Commit}}
      - -X github.com/devops-chris/platformr/cmd.BuildDate={{.Date}}
    binary: platformr

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

brews:
  - repository:
      owner: devops-chris
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    folder: Formula
    homepage: "https://github.com/devops-chris/platformr"
    description: "Configurable developer self-service platform CLI"
    license: "MIT"
    skip_upload: auto
    install: |
      bin.install "platformr"
    test: |
      system "#{bin}/platformr", "version"

release:
  github:
    owner: devops-chris
    name: platformr
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
